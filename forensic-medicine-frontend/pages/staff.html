<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Staff Management | Forensic Medicine Database</title><link rel="stylesheet" href="../css/styles.css"><link rel="stylesheet" href="../css/print.css"></head>
<body data-root=".." data-page="staff" data-title="Staff Management" data-section="Department Administration">

<section class="page-heading"><div><p class="eyebrow">Staff domain</p><h2>Staff management</h2><p>Manage staff records and professional details.</p></div><button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staffModal">Add staff</button></section>
<div class="filter-bar"><div class="filter-field search-control"><label>Search staff</label><input id="staffSearch" class="form-control" placeholder="Name, email, role, staff ID"></div><div class="filter-field"><label>Role</label><select id="staffRoleFilter" class="form-select"><option value="">All roles</option><option>Doctor</option><option>JMO</option><option>Lab Technician</option><option>Clerical Officer</option></select></div><div class="filter-field"><label>Account status</label><select id="staffAccountFilter" class="form-select"><option value="">All</option><option>Active</option><option>Suspended</option></select></div></div>
<section class="official-card"><div class="card-header card-title-row"><h3>Department staff directory</h3><span class="text-muted small"><span id="staffCount">0</span> staff records</span></div><div class="table-responsive"><table class="table align-middle"><thead><tr><th>Staff ID</th><th>Name</th><th>Role</th><th>Professional field</th><th>Contact</th><th>Account</th><th></th></tr></thead><tbody id="staffTable"></tbody></table></div></section>
<div class="modal fade" id="staffModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content official-modal"><div class="modal-header"><div><p class="eyebrow mb-1">Department staffing</p><h2 class="modal-title fs-5">Add staff</h2></div><button class="btn-close" data-bs-dismiss="modal"></button></div>
<form id="staffForm" class="needs-validation" novalidate><div class="modal-body"><div class="row g-3"><div class="col-md-6"><label class="form-label">Full name</label><input name="Name" class="form-control" required></div><div class="col-md-6"><label class="form-label">Role</label><select id="staffRole" name="Role" class="form-select" required><option value="">Select role</option><option>Doctor</option><option>JMO</option><option>Lab Technician</option><option>Clerical Officer</option></select></div><div class="col-md-6"><label class="form-label">Phone</label><input name="PhoneNumber" class="form-control" required></div><div class="col-md-6"><label class="form-label">Email</label><input name="Email" type="email" class="form-control" required></div></div><div id="roleSpecificFields" class="mt-3"></div></div><div class="modal-footer"><button class="btn btn-light" type="button" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary" type="submit">Save staff record</button></div></form>
</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/config.js"></script><script src="../js/mock-data.js"></script><script src="../js/api.js"></script><script src="../js/forms.js"></script><script src="../components/ui.js"></script><script src="../components/app-shell.js"></script>
<script src="../js/staff.js"></script>
</body></html>
